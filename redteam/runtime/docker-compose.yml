# One compose project per engagement run.
#
# Usage (from the repo root):
#   ENGAGEMENT=engagements/example.yaml docker compose \
#     -f redteam/runtime/docker-compose.yml up --abort-on-container-exit redteam
#
# Override OTEL_EXPORTER_OTLP_ENDPOINT to ship to the central org Grafana
# stack instead of the bundled local one.
#
# The atlassian_token secret is NOT mounted by default. When an engagement's
# external_mcp includes `atlassian`, add the overlay:
#   docker compose -f redteam/runtime/docker-compose.yml \
#     -f redteam/runtime/docker-compose.atlassian.yml up ...
services:
  redteam:
    build:
      context: ../..
      dockerfile: redteam/runtime/Dockerfile
    image: redteam:0.1.0
    depends_on:
      - otel-collector
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_RAW, NET_ADMIN]  # CHOWN/SETUID/SETGID: entrypoint chowns /audit then gosu-drops to uid 10001; NET_RAW for nmap; NET_ADMIN: entrypoint loads the nft egress ruleset
    read_only: true
    tmpfs:
      - /tmp
      - /home/redteam   # writable SDK state ($HOME/.claude) under the read-only rootfs (RT-23)
    # No static `user:` - the entrypoint starts as root, fixes the audit-volume
    # ownership, then drops to the unprivileged redteam user (uid 10001).
    environment:
      # Claude Code telemetry: the Agent SDK spawns the `claude` CLI, which
      # reads these at startup and ships metrics + event-logs over OTLP/gRPC to
      # the collector. (Confirmed against the Claude Code monitoring docs.)
      # NOTE: the entrypoint's default-deny egress nft ruleset only allows
      # api.anthropic.com + the engagement's egress_allowlist, so OTLP export to
      # otel-collector is dropped in the hardened container. For the dev
      # observability stack to receive data, run with REDTEAM_NETPOLICY_OPTIONAL=1
      # (dev only) or add the collector to the engagement's egress_allowlist.
      CLAUDE_CODE_ENABLE_TELEMETRY: "1"
      OTEL_METRICS_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "redteam"
      REDTEAM_KMS_KEY_ID: "${REDTEAM_KMS_KEY_ID:-}"
      REDTEAM_KMS_REGION: "${AWS_REGION:-us-east-1}"
      ENGAGEMENT_FILE: "${ENGAGEMENT:-/engagements/example.yaml}"
    volumes:
      - ../../engagements:/engagements:ro
      - ../../targets:/assets:ro              # whitebox surface (see README)
      - ./netpolicy.json:/opt/redteam/netpolicy.json:ro
      - audit:/audit
    secrets:
      - anthropic_api_key
      - gh_token
      # atlassian_token is added by docker-compose.atlassian.yml when needed.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otel/collector.yaml:ro
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "${CENTRAL_OTLP_ENDPOINT:-http://tempo:4317}"
    ports:
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP

  # Local dev observability stack (traces -> Tempo, metrics -> Prometheus,
  # dashboards -> Grafana). Bring it up with the dev profile:
  #   docker compose -f redteam/runtime/docker-compose.yml --profile dev up
  # In production set CENTRAL_OTLP_ENDPOINT and leave the dev profile off.
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    profiles: [dev]
    volumes:
      - ./otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo

  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    profiles: [dev]
    depends_on:
      - otel-collector
    volumes:
      - ./otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.0.0
    profiles: [dev]
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      # Auto-provisioned datasources (Prometheus + Tempo) + dashboard provider +
      # the redteam dashboard, so `up` shows populated panels with no import.
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./otel/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  audit:
  tempo-data:

secrets:
  anthropic_api_key:
    file: ../../.secrets/anthropic_api_key
  gh_token:
    file: ../../.secrets/gh_token
