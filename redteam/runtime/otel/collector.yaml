receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  attributes/redteam:
    actions:
      - key: deployment.environment
        value: ${env:OTEL_DEPLOYMENT_ENV:-dev}
        action: insert

exporters:
  otlp:
    # In dev points at the bundled tempo service; in prod point at the
    # org's central Grafana stack via CENTRAL_OTLP_ENDPOINT.
    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4317}
    tls:
      insecure: true
  debug:
    verbosity: normal

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes/redteam]
      exporters: [otlp, debug]
    logs:
      receivers: [otlp]
      processors: [batch, attributes/redteam]
      exporters: [otlp, debug]
    metrics:
      receivers: [otlp]
      processors: [batch, attributes/redteam]
      exporters: [otlp, debug]
