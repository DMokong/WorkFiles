# Minimal single-binary Tempo for the bundled dev stack. Receives OTLP traces
# from the collector and stores them on local disk. Not for production — the
# central Grafana stack is used there (set CENTRAL_OTLP_ENDPOINT).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
